version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ketemu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ketemu
      POSTGRES_PASSWORD: ketemu123
      POSTGRES_DB: ketemu_db
    ports:
      - "5432:5432"
    volumes:
      - ketemu_pgdata:/var/lib/postgresql/data
      - ./backend/sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/sql/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ketemu -d ketemu_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ketemu_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ketemu.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  ketemu_pgdata:
